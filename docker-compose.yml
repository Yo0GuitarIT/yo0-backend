services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace:cached # 本地程式碼掛進容器
      - go-mod-cache:/go/pkg/mod # Go 模組快取，避免每次重新下載
      - go-build-cache:/root/.cache/go-build # Go 編譯快取
    ports:
      - "8080:8080"
    command: air # 啟動 hot reload
    env_file:
      - .env

volumes:
  go-mod-cache:
  go-build-cache:
